<!DOCTYPE html>
<html>
<head>
  <title>Contact Us</title>
</head>
<body style="font-family:Arial; margin:0; background:#e6f2ff; color:#333; text-align:center;">

  <h1 style="color:#004080; margin-top:25px;">Contact Us</h1>
  <p>If you have questions or need help, use the info below:</p>
  
  <!-- table -->
  <table border="1" cellpadding="8" style="margin:20px auto; border-collapse:collapse; width:70%; background:#fff; box-shadow:0 3px 8px rgba(0,0,0,0.2);">
    <tr style="background:#004080; color:#fff;">
      <th>Method</th>
      <th>Details</th>
    </tr>
    <tr>
      <td>Email</td>
      <td><a href="mailto:info@travo.com" style="color:#004080; text-decoration:none;">info@travo.com</a></td>
    </tr>
    <tr>
      <td>Phone/WhatsApp</td>
      <td><a href="tel:+250736089824" style="color:#004080; text-decoration:none;">+250 736 089 824</a></td>
    </tr>
    <tr>
      <td>Instagram</td>
      <td style="color:#004080;">TRAVO</td>
    </tr>
    <tr>
      <td>Address</td>
      <td>Kigali City, Rwanda</td>
    </tr>
  </table>
  
  <!-- form -->
  <h2 style="color:#004080; margin-top:30px;">Send Us a Message</h2>
  <form action="#" method="post" style="background:#fff; padding:15px; border-radius:8px; width:60%; margin:20px auto; box-shadow:0 3px 8px rgba(0,0,0,0.2); text-align:left;">
    <label for="name">Full Name:</label><br>
    <input type="text" id="name" name="name" style="width:100%; padding:8px; margin:8px 0; border:1px solid #ccc; border-radius:4px;"><br>
    
    <label for="email">Email Address:</label><br>
    <input type="email" id="email" name="email" style="width:100%; padding:8px; margin:8px 0; border:1px solid #ccc; border-radius:4px;"><br>
    
    <label for="subject">Subject:</label><br>
    <input type="text" id="subject" name="subject" style="width:100%; padding:8px; margin:8px 0; border:1px solid #ccc; border-radius:4px;"><br>
    
    <label for="message">Message:</label><br>
    <textarea id="message" name="message" rows="5" style="width:100%; padding:8px; margin:8px 0; border:1px solid #ccc; border-radius:4px;"></textarea><br>
    
    <input type="submit" value="Send" style="padding:8px 15px; background:#004080; color:#fff; border:none; border-radius:4px;">
    <input type="reset" value="Clear" style="padding:8px 15px; background:#FFD700; color:#000; border:none; border-radius:4px; margin-left:10px;">
  </form>
  
  <br>
  <a href="travo.html" style="color:#004080; text-decoration:none;">Back to Home Page</a>
